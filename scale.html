<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Global Scale Lab - Special Scales</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #121212; color: #eee; margin: 0; padding: 20px; }
        .panel { background: #1e1e1e; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        .control-group { display: inline-block; margin: 10px; text-align: left; vertical-align: top; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; }
        select { padding: 8px; background: #2a2a2a; color: white; border: 1px solid #00d4ff; border-radius: 5px; cursor: pointer; min-width: 120px; }
        #score-container { background: white; padding: 10px; border-radius: 8px; margin: 20px auto; width: 850px; min-height: 150px; display: flex; justify-content: center; align-items: center; }
        .p-preview { display: flex; justify-content: center; margin: 20px 0; gap: 2px; }
        .p-key { width: 22px; height: 90px; background: white; border: 1px solid #999; flex-shrink: 0; }
        .p-key.black { width: 16px; height: 55px; background: #333; margin: 0 -9px; z-index: 2; }
        .p-key.active { background: #00d4ff !important; }
        .btn-play { padding: 12px 30px; background: #00d4ff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: #121212; margin: 5px; }
    </style>
</head>
<body>
    <h1>Scale Lab: Special & Global Scales</h1>
    
    <div class="panel">
        <div class="control-group">
            <label>主音 (Root)</label>
            <select id="root-select" onchange="updateUI()"></select>
        </div>
        <div class="control-group">
            <label>音階 (Scale Type)</label>
            <select id="type-select" onchange="updateUI()">
                <optgroup label="西洋音階">
                    <option value="major">長音階 (Major)</option>
                    <option value="naturalMinor">自然短音階 (Natural)</option>
                    <option value="harmonicMinor">和声短音階 (Harmonic)</option>
                    <option value="melodicMinor">旋律短音階 (Melodic)</option>
                </optgroup>
                <optgroup label="日本の伝統音階">
                    <option value="yonanukiMajor">ヨナ抜き長音階</option>
                    <option value="yonanukiMinor">ヨナ抜き短音階</option>
                    <option value="ryukyu">琉球音階</option>
                </optgroup>
            </select>
        </div>
        <div class="control-group">
            <label>記号 (Clef)</label>
            <select id="clef-select" onchange="updateUI()">
                <option value="treble">ト音記号</option>
                <option value="bass">ヘ音記号</option>
            </select>
        </div>
        <div class="control-group">
            <label>再生方向</label>
            <select id="direction-select">
                <option value="round">往復</option>
                <option value="up">上りのみ</option>
                <option value="down">下りのみ</option>
            </select>
        </div>
        <br>
        <button class="btn-play" onclick="playScale()">再生 / PLAY</button>
    </div>

    <div id="score-container"></div>
    <div id="piano-preview" class="p-preview"></div>

    <script>
        const { Renderer, Stave, StaveNote, Accidental, Formatter } = Vex.Flow;
        const midiMap = { "C":0, "Cs":1, "Db":1, "D":2, "Eb":3, "E":4, "F":5, "Fs":6, "Gb":6, "G":7, "Ab":8, "A":9, "Bb":10, "B":11 };
        
        // 音階データの拡張
        const intervals = {
            major: [0, 2, 4, 5, 7, 9, 11, 12],
            naturalMinor: [0, 2, 3, 5, 7, 8, 10, 12],
            harmonicMinor: [0, 2, 3, 5, 7, 8, 11, 12],
            melodicMinor: [0, 2, 3, 5, 7, 9, 11, 12],
            // ヨナ抜き長音階: ドレミソラド (4, 7抜き)
            yonanukiMajor: [0, 2, 4, 7, 9, 12],
            // ヨナ抜き短音階: ラシドミファラ (2, 5抜き / 自然短音階から4, 7抜き)
            yonanukiMinor: [0, 2, 3, 7, 8, 12],
            // 琉球音階: ドミファソシド (2, 6抜き)
            ryukyu: [0, 4, 5, 7, 11, 12]
        };

        const sampler = new Tone.Sampler({
            urls: { A4: "A4.mp3", C4: "C4.mp3", C5: "C5.mp3", C6: "C6.mp3" },
            baseUrl: "https://tonejs.github.io/audio/salamander/",
        }).toDestination();

        const rs = document.getElementById('root-select');
        Object.keys(midiMap).forEach(k => {
            let opt = document.createElement('option');
            opt.value = k; opt.innerText = k.replace('s', '♯').replace('b', '♭');
            rs.appendChild(opt);
        });

        function getScaleData() {
            const root = document.getElementById('root-select').value;
            const type = document.getElementById('type-select').value;
            const clef = document.getElementById('clef-select').value;
            const rootMidi = midiMap[root];
            const baseMidi = (clef === 'treble') ? 60 : 48;
            
            let up = intervals[type].map(i => baseMidi + rootMidi + i);
            let down = (type === 'melodicMinor') 
                ? [12, 10, 8, 7, 5, 3, 2, 0].map(i => baseMidi + rootMidi + i)
                : [...up].reverse();
            
            return { up, down, root, type, clef };
        }

        function updateUI() {
            const { up, down, clef } = getScaleData();
            const full = [...up, ...down.slice(1)];
            renderPiano(full);
            setTimeout(() => renderScore(full, clef), 50);
        }

        function renderPiano(midis) {
            const container = document.getElementById('piano-preview');
            container.innerHTML = "";
            const min = Math.min(...midis) - 2;
            const max = Math.max(...midis) + 2;
            for (let m = min; m <= max; m++) {
                const isBlack = [1, 3, 6, 8, 10].includes(m % 12);
                const div = document.createElement('div');
                div.className = `p-key ${isBlack ? 'black' : ''} ${midis.includes(m) ? 'active' : ''}`;
                container.appendChild(div);
            }
        }

        function renderScore(midis, clef) {
            const container = document.getElementById("score-container");
            container.innerHTML = "";
            const canvas = document.createElement("canvas");
            canvas.width = 830; canvas.height = 150;
            container.appendChild(canvas);

            const renderer = new Renderer(canvas, Renderer.Backends.CANVAS);
            const context = renderer.getContext();
            const stave = new Stave(10, 10, 810);

            const root = document.getElementById('root-select').value;
            const type = document.getElementById('type-select').value;
            
            // 調号の計算（日本の音階は便宜上メジャー/マイナーに近いものを設定）
            let keySpec = root.replace('s', '#');
            if (type.includes('Minor')) keySpec += "m";
            
            stave.addClef(clef).addKeySignature(keySpec);
            stave.setContext(context).draw();

            const notes = midis.map((midi, i) => {
                const octave = Math.floor(midi / 12) - 1;
                const noteName = ["c", "c", "d", "d", "e", "f", "f", "g", "g", "a", "a", "b"][midi % 12];
                const stemDir = (clef === 'treble') ? (midi >= 71 ? -1 : 1) : (midi >= 50 ? -1 : 1);

                const sn = new StaveNote({ clef, keys: [noteName + "/" + octave], duration: "8", stem_direction: stemDir });

                // 臨時記号のロジック（特殊音階でも「調号と違う音」に付ける）
                // 簡略化のため、変化が必要な相対半音で判定
                const rel = (midi - midiMap[root] + 120) % 12;
                if (type === "harmonicMinor" && rel === 11) sn.addModifier(new Accidental("#"));
                if (type === "ryukyu" && (rel === 4 || rel === 11)) sn.addModifier(new Accidental("#"));
                if (type === "melodicMinor") {
                    if (i < intervals[type].length && (rel === 9 || rel === 11)) sn.addModifier(new Accidental("#"));
                    else if (i >= intervals[type].length && (rel === 8 || rel === 10)) sn.addModifier(new Accidental("n"));
                }
                return sn;
            });

            Formatter.FormatAndDraw(context, stave, notes);
        }

        async function playScale() {
            await Tone.start();
            const { up, down } = getScaleData();
            const dir = document.getElementById('direction-select').value;
            let playList = (dir === 'up') ? up : (dir === 'down') ? down : [...up, ...down.slice(1)];

            playList.forEach((m, i) => {
                sampler.triggerAttackRelease(Tone.Frequency(m, "midi"), "4n", Tone.now() + i * 0.35);
            });
        }

        window.onload = updateUI;
    </script>
</body>
</html>
